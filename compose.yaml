# Shared env for both deployment-manager roles (APP_MODE is set per service).
x-dm-env: &dm-env
  NETWORK: "${NETWORK:-devnet}"
  VAULT_KEY: "${VAULT_KEY:-change_me}"
  TASKS_BATCH_SIZE: "${TASKS_BATCH_SIZE:-10}"
  # Transient-failure retry cooldown (ms). Override low (e.g. 2000) for fast
  # targeted error-scenario runs. `0` for TASK_MAX_INFLIGHT_RETRIES = retry forever.
  RETRY_COOLDOWN_BASE_MS: "${RETRY_COOLDOWN_BASE_MS:-30000}"
  TASK_MAX_INFLIGHT_RETRIES: "${TASK_MAX_INFLIGHT_RETRIES:-60}"
  # Rapid-completion throttle/ceiling. The rapid-completion scenario tests set
  # JOB_COUNT=1 (throttle on a single fast job) and MAX_STREAK=1 (ceiling-stop on
  # the first round) so they need only one finish cycle. `0` MAX_STREAK = never stop.
  RAPID_COMPLETION_JOB_COUNT: "${RAPID_COMPLETION_JOB_COUNT:-3}"
  RAPID_COMPLETION_MAX_STREAK: "${RAPID_COMPLETION_MAX_STREAK:-8}"
  RAPID_COMPLETION_COOLDOWN_BASE_MS: "${RAPID_COMPLETION_COOLDOWN_BASE_MS:-60000}"
  CONFIDENTIAL_BY_DEFAULT: "${CONFIDENTIAL_BY_DEFAULT:-true}"
  DEPLOYMENT_MANAGER_PORT: "${DEPLOYMENT_MANAGER_PORT:-3000}"
  SOLANA_NETWORK: "${SOLANA_NETWORK}"
  SOLANA_WS_NETWORK: "${SOLANA_WS_NETWORK}"
  DOCDB_HOST: "${DOCDB_HOST:-host.docker.internal}"
  DOCDB_PORT: "${DOCDB_PORT:-27017}"
  DOCDB_USERNAME: "${DOCDB_USERNAME}"
  DOCDB_PASSWORD: "${DOCDB_PASSWORD}"

# Shared build/runtime config for both deployment-manager roles.
x-deployment-manager: &deployment-manager
  build:
    context: .
    dockerfile: Dockerfile
    args:
      SKIP_FETCH_RDS_BUNDLE: true
  image: deployment_manager:latest
  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - deployments_network
  develop:
    watch:
      - action: sync+restart
        path: ./
        target: /app
        ignore:
          - node_modules/
          - examples/
      - action: rebuild
        path: package.json

services:
  deployments_db:
    image: mongo:8.0
    volumes:
      - deploymentsdbdata:/data/db
    networks:
      - deployments_network
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'host.docker.internal:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      start_period: 0s
      start_interval: 1s
      retries: 30
  mongo_express:
    image: mongo-express:latest
    depends_on:
      deployments_db:
        condition: service_healthy
    entrypoint: ["/sbin/tini", "--", "node", "app"]
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=deployments_db
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH=false
    networks:
      - deployments_network

  # API role: serves HTTP, schedules tasks. Single instance. In `api` mode the
  # process waits for migrations to be applied (the workers run them).
  deployment_manager_api:
    <<: *deployment-manager
    depends_on:
      deployments_db:
        condition: service_healthy
      # Start the workers first so migrations are running before the api waits.
      deployment_manager_worker:
        condition: service_started
    environment:
      <<: *dm-env
      APP_MODE: api
    ports:
      - "3001:3000"

  # Worker role: the task consumer. Scaled to 2 replicas to exercise the
  # multi-consumer claim/lease path (atomic claim + per-deployment lock) under a
  # real scaling condition. No api server — just the listener loop plus a small
  # health/metrics server.
  deployment_manager_worker:
    <<: *deployment-manager
    depends_on:
      deployments_db:
        condition: service_healthy
    environment:
      <<: *dm-env
      APP_MODE: worker
    deploy:
      # Single replica (intentional, interim). The strategy/account listeners run
      # in EVERY worker via MongoDB change streams, so with N replicas one
      # deployment/job change fires each listener N times → duplicate task
      # scheduling (LIST on deployment start, EXTEND on job running, …). LIST
      # tasks carry no job id and aren't idempotent, so a unique index can't
      # dedupe them; the real fix is to run the listeners on a single elected
      # leader while keeping N task-consumers for HA. Until that lands: one worker.
      replicas: 1
    # Two replicas can't share a fixed host port; publish container 3000 to an
    # ephemeral host port per replica so each worker's /health, /stats and
    # /metrics are reachable (find them with `docker compose port`).
    ports:
      - "3000"

volumes:
  deploymentsdbdata:

networks:
  deployments_network:
    external: true
